<!DOCTYPE html>
<html>
<head><title>Search</title></head>
<body>

<h1>Search Students</h1>

<form method="POST">

    <input type="text" name="keyword" placeholder="Search anything (Name / Course / Age)">

    <button type="submit">Search</button>

    <a href="/search">
        <button type="button">Reset</button>
    </a>

</form>

<br>

<table border="1">
    <tr>
        <th>ID</th><th>Name</th><th>Age</th><th>Course</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/export/excel"><button>Export Excel</button></a>
<a href="/export/pdf"><button>Export PDF</button></a>

</body>
</html>
